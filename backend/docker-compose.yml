version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: zirve_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zirve
    ports:
      - "5432:5432"
    volumes:
      - zirve_postgres_data:/var/lib/postgresql/data

  fastapi:
    build:
      context: ./backend
    container_name: zirve_fastapi
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  zirve_postgres_data:
    driver: local
