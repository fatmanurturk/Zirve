version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: zirve_db
    environment:
      POSTGRES_USER: zirve
      POSTGRES_PASSWORD: zirve123
      POSTGRES_DB: zirve_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: zirve_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

volumes:
  postgres_data:
